<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso | SistemaSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; }
        .login-card { width: 350px; padding: 2rem; border-radius: 15px; background: white; }
    </style>
</head>
<body>
    <div class="login-card shadow-lg text-center">
        <h3 class="text-primary fw-bold mb-4">SistemaSmart ⚕</h3>
        <p class="text-muted small">Ingrese su PIN de seguridad</p>
        
        {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form action="/login" method="post">
            <input type="password" name="pin" class="form-control form-control-lg text-center mb-4" 
                   placeholder="****" maxlength="4" required autofocus>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Entrar al Sistema</button>
        </form>
    </div>
</body>
</html>
